name: "Release v29.4 (x86_64) with NativeComp"
on:
  workflow_dispatch:

jobs:
  release-29-native-x86_64-latest:
    runs-on: macos-26-intel
    timeout-minutes: 90
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install the Apple certificate and provisioning profile
      uses: ./.github/actions/certificate-and-provisioning-profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        DISTRIBUTE_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTE_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
    - name: Setup to build
      run: sh build/setup.sh
    - name: Build Emacs 29.4 with inline patch
      run: |
        mv ${{ github.workspace }}/.git ${{ github.workspace }}/_git
        sh build/emacs-29.sh -d ${{ github.workspace }} -p inline -j4
        mv ${{ github.workspace }}/_git ${{ github.workspace }}/.git
    - name: Verification
      run: ${{ github.workspace }}/emacs-29.4/nextstep/Emacs.app/Contents/MacOS/Emacs --batch --eval="(unless (fboundp 'mac-input-method-mode) (error \"The inline-patch is NOT integrated\"))"
    - name: Portable
      run: sh release/portable-emacs.sh -v 29.4 -d ${{ github.workspace }}
    - name: Notarize
      run: sh release/notarize-emacs.sh -v 29.4 -d ${{ github.workspace }} -s ${{ github.workspace }} -p inline -a "github-emacs-build"
    - name: Export
      uses: ./.github/actions/exporting
      env:
        ORZ_HOST: ${{ secrets.ORZ_HOST }}
        ORZ_PORT: ${{ secrets.ORZ_PORT }}
        ORZ_ID_BASE64: ${{ secrets.ORZ_ID_BASE64 }}
    - name: Clean up keychain and provisioning profile
      if: ${{ always() }}
      uses: ./.github/actions/cleanup

  release-29-native-x86_64-sequoia:
    runs-on: macos-15-intel
    timeout-minutes: 60
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install the Apple certificate and provisioning profile
      uses: ./.github/actions/certificate-and-provisioning-profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        DISTRIBUTE_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTE_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
    - name: Setup to build
      run: sh build/setup.sh
    - name: Build Emacs 29.4 with inline patch
      run: |
        mv ${{ github.workspace }}/.git ${{ github.workspace }}/_git
        sh build/emacs-29.sh -d ${{ github.workspace }} -p inline -j4
        mv ${{ github.workspace }}/_git ${{ github.workspace }}/.git
    - name: Verification
      run: ${{ github.workspace }}/emacs-29.4/nextstep/Emacs.app/Contents/MacOS/Emacs --batch --eval="(unless (fboundp 'mac-input-method-mode) (error \"The inline-patch is NOT integrated\"))"
    - name: Portable
      run: sh release/portable-emacs.sh -v 29.4 -d ${{ github.workspace }}
    - name: Notarize
      run: sh release/notarize-emacs.sh -v 29.4 -d ${{ github.workspace }} -s ${{ github.workspace }} -p inline -a "github-emacs-build" -m "15"
    - name: Export
      uses: ./.github/actions/exporting
      env:
        ORZ_HOST: ${{ secrets.ORZ_HOST }}
        ORZ_PORT: ${{ secrets.ORZ_PORT }}
        ORZ_ID_BASE64: ${{ secrets.ORZ_ID_BASE64 }}
    - name: Clean up keychain and provisioning profile
      if: ${{ always() }}
      uses: ./.github/actions/cleanup
